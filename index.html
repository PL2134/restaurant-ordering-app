<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Smythe&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

    <body>
        <header>
            <h1>Jimmy's Diner</h1>
            <p>The best burgers and pizzas in town.</p>
        </header>
        <main>
            <section id="menu-container">
                <!-- menu items will be injected here by JavaScript -->
            </section>
            <section id="order-container">
                <!-- order section will be injected here by JavaScript -->
            </section>
        </main>
        <div class="modal-content">
            <h3>Enter card details</h3>
            <form id="payment-form">
                <input type="text" id="name-input" placeholder="Enter your name" required>
                <input type="text" placeholder="Enter card number" required>
                <input type="text" placeholder="Enter your CVV" required>
                <button type="submit">Pay</button>
            </form>
        </div>
    <script src="data.js"></script>
	<script src="index.js"></script>
    </body>
</html>
